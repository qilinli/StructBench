# Wave-1D GNS baseline (ADR-0025 task; grouped per ADR-0032).

[run]
benchmark = "wave_propagation_1d"
seed = 0                        # torch RNG: init, noise, shuffle

[model]
family = "gns"
window = 11
connectivity_radius = 4.8  # ~2.4x the 2.0 mm particle spacing
hidden_dim = 64
message_passing_steps = 5
nmlp_layers = 1
particle_type_embedding_size = 9
noise_std = 0.02
dim = 2
max_neighbors = 48

[train]
batch_size = 32
lr_init = 1e-4  # reference GNS rate (ADR-0028); the old 1e-3 default drove memorization
lr_decay = 0.1
lr_decay_steps = 30000
training_steps = 50000  # 16 small cases; half the Taylor budget
val_every = 2000
w_pos = 1.0
w_aux = 1.0
