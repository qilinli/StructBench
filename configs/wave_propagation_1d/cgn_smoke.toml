# 10-step smoke of the wave-1d pipeline.

[run]
benchmark = "wave_propagation_1d"
seed = 0                        # torch RNG: init, noise, shuffle

[model]
family = "cgn"
input_frames = 6
connectivity_radius = 4.8
hidden_dim = 64
message_passing_steps = 5
nmlp_layers = 1
particle_type_embedding_size = 9
noise_std = 0.02
dim = 2
max_neighbors = 32  # project-wide backstop cap (M-B, 2026-07-06)

[train]
batch_size = 2
lr_init = 1e-4
lr_decay = 0.1
# lr_decay_steps is derived from training_steps by config.py (round(steps * 40000/100000)).
training_steps = 10
val_every = 5
w_pos = 1.0
w_aux = 1.0
