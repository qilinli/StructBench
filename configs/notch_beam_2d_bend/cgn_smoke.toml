# 10-step smoke of the notch-bend pipeline.

[run]
benchmark = "notch_beam_2d_bend"
seed = 0                        # torch RNG: init, noise, shuffle

[model]
family = "cgn"
window = 11
connectivity_radius = 7.5  # 3x the 2.5 mm spacing (2-3x convention)
hidden_dim = 64
message_passing_steps = 5
nmlp_layers = 1
particle_type_embedding_size = 9
noise_std = 0.02
dim = 2
max_neighbors = 32  # project-wide backstop cap (M-B, 2026-07-06)

[train]
batch_size = 2
lr_init = 1e-4
lr_decay = 0.1
# lr_decay_steps is derived from training_steps by config.py (round(steps * 30000/80000)).
training_steps = 10
val_every = 5
w_pos = 1.0
w_aux = 1.0
