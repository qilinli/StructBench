# Taylor 2D CGN baseline (Li et al. 2023; ADR-0034) (ADR-0019 task; recipe per ADR-0028, grouped per ADR-0032).

[run]
benchmark = "taylor_impact_2d"
seed = 0                        # torch RNG: init, noise, shuffle

[model]
family = "cgn"
window = 11
connectivity_radius = 1.5  # 3x particle spacing (ADR-0028); 0.6 broke edges under rollout drift
hidden_dim = 64
message_passing_steps = 5
nmlp_layers = 1
particle_type_embedding_size = 9
noise_std = 0.02
dim = 2
max_neighbors = 48

[train]
batch_size = 32
lr_init = 1e-4  # reference rate (ADR-0028); the old 1e-3 default drove memorization
lr_decay = 0.1
lr_decay_steps = 30000
training_steps = 100000
val_every = 2000
w_pos = 1.0
w_aux = 1.0
