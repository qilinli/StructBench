# Taylor 2D CGN baseline (Li et al. 2023; ADR-0034) (ADR-0019 task; grouped per ADR-0032).
# Recipe: ADR-0028 mechanics + reference capacity and 100k budget (extended from
# ADR-0028's 80k reference as the default baseline, 2026-07-07; lr_decay_steps derives
# to 40000 — clean decade drops at 40k/80k, 2.5 periods), selected on the 2026-07-03/04 fleets
# (capacity dominant, noise 0.02, w_aux 1.0). Protocol
# is input_frames = 6 (ADR-0035): the model history length is also the rollout seed
# count (C = 5 velocities, the GNS reference); no constant-velocity backfill.

[run]
benchmark = "taylor_impact_2d"
seed = 1                        # torch RNG: init, noise, shuffle; s1 is the blessed baseline run (ADR-0033) — this config is that recipe verbatim

[model]
family = "cgn"
input_frames = 6
connectivity_radius = 1.5  # 3x particle spacing (ADR-0028); 0.6 broke edges under rollout drift
hidden_dim = 128
message_passing_steps = 10
nmlp_layers = 2
particle_type_embedding_size = 9
noise_std = 0.02
dim = 2
max_neighbors = 32  # 32 nearest per hop; taylor's physical degree hits ~53 in the mushroom so this DOES truncate at 1 hop by design — long-range coverage comes from the 10 MP hops, not the 1-hop cap (measured 2026-07-07)

[train]
batch_size = 8   # A100-80GB memory bound at this capacity (batch 16 OOMs)
lr_init = 1e-4  # reference rate (ADR-0028); the old 1e-3 default drove memorization
lr_decay = 0.1
# lr_decay_steps is derived from training_steps by config.py: round(steps * 40000/100000).
training_steps = 100000  # -> derived lr_decay_steps 40000 (2.5 periods; clean decade drops at 40k/80k, ends ~1.3x the 1e-6 floor)
val_every = 2000
w_pos = 1.0
w_aux = 1.0
