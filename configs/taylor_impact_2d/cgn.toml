# Taylor 2D CGN baseline (Li et al. 2023; ADR-0034) (ADR-0019 task; grouped per ADR-0032).
# Recipe: ADR-0028 mechanics + reference capacity and 80k budget, selected on the
# 2026-07-03/04 ablation fleets and re-validated under the init=3 protocol
# (scratch/2026-07-05-init3-reeval.md): capacity dominant, noise 0.02, w_aux 1.0.

[run]
benchmark = "taylor_impact_2d"
seed = 0                        # torch RNG: init, noise, shuffle

[model]
family = "cgn"
window = 11
connectivity_radius = 1.5  # 3x particle spacing (ADR-0028); 0.6 broke edges under rollout drift
hidden_dim = 128
message_passing_steps = 10
nmlp_layers = 2
particle_type_embedding_size = 9
noise_std = 0.02
dim = 2
max_neighbors = 32  # project-wide backstop cap (M-B, 2026-07-06): sized above the physical degree so truncation never occurs

[train]
batch_size = 8   # A100-80GB memory bound at this capacity (batch 16 OOMs)
lr_init = 1e-4  # reference rate (ADR-0028); the old 1e-3 default drove memorization
lr_decay = 0.1
lr_decay_steps = 30000  # one decade per 30k; with the code's +1e-6 floor the
                        # effective lr runs 1e-4 -> 1.2e-6 over the 80k budget
training_steps = 80000  # fleet's best ckpt landed on the final step at 40k
val_every = 2000
w_pos = 1.0
w_aux = 1.0
