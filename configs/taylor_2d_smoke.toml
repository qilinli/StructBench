# CPU smoke config — exercises the full train -> checkpoint -> eval path on the
# real Taylor 2D data end to end. NOT a baseline: far too few steps to learn
# anything. Same architecture as taylor_2d.toml, tiny schedule so it finishes in
# a few minutes on CPU.

# --- architecture + training noise (GNSConfig) ---
window = 11
connectivity_radius = 0.6
hidden_dim = 64
message_passing_steps = 5
nmlp_layers = 1
particle_type_embedding_size = 9
noise_std = 0.02
dim = 2

# --- optimization schedule + loss weights (TrainConfig) ---
batch_size = 4
lr_init = 1e-3
lr_decay = 0.1
lr_decay_steps = 30000
training_steps = 10
val_every = 10
w_pos = 1.0
w_aux = 1.0
