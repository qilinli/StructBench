# 10-step smoke of the notch-impact pipeline.

[run]
benchmark = "notch_beam_2d_impact"
seed = 0                        # torch RNG: init, noise, shuffle

[model]
family = "cgn"
window = 11
connectivity_radius = 15.0
hidden_dim = 64
message_passing_steps = 5
nmlp_layers = 1
particle_type_embedding_size = 9
noise_std = 0.02
dim = 2
max_neighbors = 32  # project-wide cap (M-B, 2026-07-06); connectivity_radius=15 is stale-legacy (~113 nbrs), radius reduction to ~10-20 nbrs pending

[train]
batch_size = 2
lr_init = 1e-4
lr_decay = 0.1
lr_decay_steps = 30000
training_steps = 10
val_every = 5
w_pos = 1.0
w_aux = 1.0
