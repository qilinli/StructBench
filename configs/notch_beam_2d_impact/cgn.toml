# NotchBeam2D-Impact CGN baseline (Li et al. 2023; ADR-0034) (ADR-0026 task; grouped per ADR-0032).

[run]
benchmark = "notch_beam_2d_impact"
seed = 0                        # torch RNG: init, noise, shuffle

[model]
family = "cgn"
window = 11
connectivity_radius = 15.0  # 6x the 2.5 mm particle spacing (ADR-0028 convention)
hidden_dim = 64
message_passing_steps = 5
nmlp_layers = 1
particle_type_embedding_size = 9
noise_std = 0.02
dim = 2
max_neighbors = 32  # project-wide cap (M-B, 2026-07-06). NB: connectivity_radius=15 below is a stale legacy value (~113 neighbours) so this cap currently binds; reduce the radius to bring the physical count into the ~10-20 target before notch training

[train]
batch_size = 32
lr_init = 1e-4  # reference rate (ADR-0028); the old 1e-3 default drove memorization
lr_decay = 0.1
lr_decay_steps = 30000
training_steps = 100000
val_every = 2000
w_pos = 1.0
w_aux = 1.0
