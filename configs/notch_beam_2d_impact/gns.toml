# NotchBeam2D-Impact GNS baseline (ADR-0026 task; grouped per ADR-0032).

[run]
benchmark = "notch_beam_2d_impact"
seed = 0                        # torch RNG: init, noise, shuffle

[model]
family = "gns"
window = 11
connectivity_radius = 15.0  # 6x the 2.5 mm particle spacing (ADR-0028 convention)
hidden_dim = 64
message_passing_steps = 5
nmlp_layers = 1
particle_type_embedding_size = 9
noise_std = 0.02
dim = 2
max_neighbors = 48  # FLAGGED (ADR-0032): ~113 physical neighbours at r=15; re-size per ADR-0028's never-binds rule before any notch training

[train]
batch_size = 32
lr_init = 1e-4  # reference GNS rate (ADR-0028); the old 1e-3 default drove memorization
lr_decay = 0.1
lr_decay_steps = 30000
training_steps = 100000
val_every = 2000
w_pos = 1.0
w_aux = 1.0
