# StructBench v0.1 — Taylor 2D impact benchmark, GNS baseline (ADR-0019).
#
# Full training configuration for the reference GNS surrogate. A real run of
# 100k steps is hours on CPU; use CUDA for the actual baseline. The file is a
# single flat table: `GNSConfig.from_toml` and `TrainConfig.from_toml` each pick
# the keys that name one of their fields (see cli/train.py).
#
# Recipe revised per ADR-0028 after the first full baseline run: wider graph,
# reference learning rate, gradient clipping, position-based model selection.

# --- architecture + training noise (GNSConfig) ---
window = 11                       # input history length (frames per sample)
connectivity_radius = 1.5         # graph radius, mm = 3x particle spacing (ADR-0028;
                                  # 0.6 gave a 4-connected lattice whose edges broke
                                  # under 0.1 mm of rollout drift)
max_neighbors = 48                # radius-graph cap; above the true max degree at
                                  # r=1.5 so it never binds on physical states
hidden_dim = 64                   # latent / MLP width
message_passing_steps = 5         # interaction-network steps
nmlp_layers = 1                   # hidden layers per MLP
particle_type_embedding_size = 9  # part-id embedding width
noise_std = 0.02                  # random-walk position noise (last step)
dim = 2                           # spatial dimensionality

# --- optimization schedule + loss weights (TrainConfig) ---
batch_size = 32
lr_init = 1e-4                    # reference GNS rate; 1e-3 at batch 32 over only
                                  # ~3k unique windows drove memorization + spikes
lr_decay = 0.1
lr_decay_steps = 30000
training_steps = 100000
val_every = 2000
w_pos = 1.0                       # acceleration (position) loss weight
w_aux = 1.0                       # auxiliary (von Mises) loss weight
